<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friend Poker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Lobby -->
  <div id="lobby">
    <div class="lobby-box">
      <h1>Friend Poker</h1>
      <p class="subtitle">Texas Hold'em — play with friends</p>
      <input id="nameInput" type="text" placeholder="Your name" maxlength="16" autocomplete="off" />
      <div class="lobby-buttons">
        <button id="createBtn">Create Room</button>
        <div class="join-row">
          <input id="roomInput" type="text" placeholder="Room code" maxlength="6" autocomplete="off" />
          <button id="joinBtn">Join</button>
        </div>
      </div>
      <p id="lobbyError" class="error"></p>
    </div>
  </div>

  <!-- Game Table -->
  <div id="gameTable" class="hidden">
    <div class="table-header">
      <span id="roomDisplay"></span>
      <span id="stageDisplay"></span>
    </div>

    <!-- MOBILE layout -->
    <div id="mobileLayout" class="hidden">
      <div id="mobileOpponents"></div>
      <div class="center-area">
        <div id="communityCardsMobile" class="card-row"></div>
        <div id="potDisplayMobile" class="pot">Pot: 0</div>
      </div>
      <div id="myHandStrip"></div>
    </div>

    <!-- DESKTOP layout: opponents sit around the table in absolute positions -->
    <div id="desktopLayout">
      <div class="center-area">
        <div id="communityCards" class="card-row"></div>
        <div id="potDisplay" class="pot">Pot: 0</div>
      </div>
      <div id="seats"></div>
      <!-- My hand always anchored above the bottom panel -->
      <div id="myHandDesktop"></div>
    </div>

    <!-- Waiting panel -->
    <div id="waitingPanel" class="panel">
      <p>Share the room code with friends:</p>
      <div class="room-code" id="roomCode"></div>
      <button id="startBtn">Start Game</button>
      <p class="hint">Need at least 2 players</p>
    </div>

    <!-- Action panel -->
    <div id="actionPanel" class="panel hidden">
      <div class="bet-info">
        <span id="potInfo"></span>
        <span id="toCallInfo"></span>
        <span id="limitInfo"></span>
      </div>
      <div class="action-buttons">
        <button id="foldBtn"  class="btn-fold">Fold</button>
        <button id="checkBtn" class="btn-check">Check</button>
        <button id="callBtn"  class="btn-call">Call</button>
        <button id="raiseBtn" class="btn-raise" id="raiseConfirmBtn">Raise</button>
        <button id="allInBtn" class="btn-allin">All In</button>
      </div>
      <!-- Raise builder row -->
      <div id="raiseBuilder" class="raise-builder hidden">
        <div class="raise-limits" id="raiseLimits"></div>
        <div class="raise-presets" id="raisePresets"></div>
        <div class="raise-row">
          <button class="raise-adj" id="raiseMinus">−</button>
          <input id="raiseInput" type="number" min="0" step="10" />
          <button class="raise-adj" id="raisePlus">+</button>
          <button id="raiseConfirm" class="btn-raise">Raise</button>
        </div>
      </div>
    </div>

    <!-- Showdown overlay -->
    <div id="showdownOverlay" class="hidden overlay">
      <div class="showdown-box">
        <h2>Showdown</h2>
        <div id="showdownResults"></div>
        <p class="hint">Next hand starting in 5s…</p>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
